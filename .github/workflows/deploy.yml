name: 🚀 Деплой на Timeweb Apps с PM2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      PRODUCTION_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Environment variables for Next.js build
      NEXT_PUBLIC_N8N_WEBHOOK_URL: ${{ secrets.NEXT_PUBLIC_N8N_WEBHOOK_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
    - name: 📥 Checkout код
      uses: actions/checkout@v4

    - name: 🔧 Настройка Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: 📦 Установка зависимостей
      run: npm ci

    - name: 📝 Создание .env файла
      env:
        NEXT_PUBLIC_N8N_WEBHOOK_URL: ${{ secrets.NEXT_PUBLIC_N8N_WEBHOOK_URL }}
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        PRODUCTION_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "NEXT_PUBLIC_N8N_WEBHOOK_URL=$NEXT_PUBLIC_N8N_WEBHOOK_URL" >> .env
        echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL" >> .env
        echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> .env
        
        if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
          echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> .env
        fi
        
        echo "PRODUCTION_DOMAIN=$PRODUCTION_DOMAIN" >> .env
        echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> .env
        echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" >> .env

    - name: 🏗️ Сборка приложения
      run: |
        npm run build
        echo "📂 Проверка собранных API роутов:"
        ls -R .next/server/app/api || echo "API routes not found in build!"

    - name: 🔎 Валидация переменных окружения
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      shell: bash
      run: |
        set -eu
        show_presence() { [ -n "$1" ] && echo "set" || echo "missing"; }
        show_len() { [ -n "$1" ] && echo "${#1}" || echo "0"; }
        echo "SSH_HOST: $(show_presence "$SSH_HOST")"
        echo "SSH_USER: $(show_presence "$SSH_USER")"
        echo "SSH_PRIVATE_KEY length: $(show_len "$SSH_PRIVATE_KEY")"
        echo "PRODUCTION_DOMAIN: $(show_presence "$PRODUCTION_DOMAIN")"
        echo "TELEGRAM_BOT_TOKEN: $(show_presence "$TELEGRAM_BOT_TOKEN")"
        echo "TELEGRAM_CHAT_ID: $(show_presence "$TELEGRAM_CHAT_ID")"

    - name: 🔑 Настройка SSH ключа
      if: >
        github.ref == 'refs/heads/main' &&
        github.event_name == 'push' &&
        env.SSH_HOST != '' &&
        env.SSH_USER != '' &&
        env.SSH_PRIVATE_KEY != ''
      shell: bash
      run: |
        set -eu
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

    - name: 🔍 Проверка SSH соединения
      if: >
        github.ref == 'refs/heads/main' &&
        github.event_name == 'push' &&
        env.SSH_HOST != '' &&
        env.SSH_USER != '' &&
        env.SSH_PRIVATE_KEY != ''
      shell: bash
      run: |
        set -e
        echo "🔌 Тестирование SSH соединения:"
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          echo "1. Текущий пользователь: $(whoami)"
          echo "2. Текущая директория: $(pwd)"
          echo "3. Проверка Node.js: $(node -v)"
          echo "4. Проверка npm: $(npm -v)"
        EOF

    - name: 🧹 Очистка места на сервере
      if: >
        github.ref == 'refs/heads/main' &&
        github.event_name == 'push' &&
        env.SSH_HOST != '' &&
        env.SSH_USER != '' &&
        env.SSH_PRIVATE_KEY != ''
      shell: bash
      run: |
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" << 'EOF'
          echo "🧹 Очистка дискового пространства..."
          # Очистка кэша npm
          npm cache clean --force
          
          # Удаление старых сборок и зависимостей
          rm -rf /var/www/html/.next
          rm -rf /var/www/html/node_modules
          
          # Очистка логов PM2 (опционально, но полезно)
          rm -f ~/.pm2/logs/*.log
          
          echo "💾 Свободное место после очистки:"
          df -h /
        EOF

    - name: 📤 Деплой файлов через SSH
      if: >
        github.ref == 'refs/heads/main' &&
        github.event_name == 'push' &&
        env.SSH_HOST != '' &&
        env.SSH_USER != '' &&
        env.SSH_PRIVATE_KEY != ''
      shell: bash
      run: |
        rsync -avz --delete \
          -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
          --exclude='.git' \
          --exclude='node_modules' \
          --exclude='.next/cache' \
          . "$SSH_USER@$SSH_HOST:/var/www/html/"

    - name: 📤 Деплой PM2 конфигурации
      if: >
        github.ref == 'refs/heads/main' &&
        github.event_name == 'push' &&
        env.SSH_HOST != '' &&
        env.SSH_USER != '' &&
        env.SSH_PRIVATE_KEY != ''
      shell: bash
      run: |
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e

          cd /var/www/html

          echo "🧹 ПОЛНАЯ ОЧИСТКА: Удаление всех HTML файлов из корня..."
          # Удаляем index.html, 404.html и любые другие html файлы в корне
          rm -f /var/www/html/*.html
          
          # На всякий случай удаляем папку out если она есть (от старого экспорта)
          rm -rf /var/www/html/out
          
          echo "📂 Проверка содержимого после очистки:"
          ls -la /var/www/html/

          echo "📦 Установка production зависимостей..."
          npm ci --production

          echo "📤 Установка PM2..."
          npm install pm2

          echo "🔄 Жесткий перезапуск приложения через PM2..."
          npm exec pm2 -- delete svyatobor-landing || true
          npm exec pm2 -- start ecosystem.config.js --update-env

          echo "💾 Сохранение конфигурации PM2..."
          npm exec pm2 -- save

          echo "✅ PM2 статус:"
          npm exec pm2 -- status
        EOF

    - name: 📤 Синхронизация изображений
      if: >
        github.ref == 'refs/heads/main' &&
        github.event_name == 'push' &&
        env.SSH_HOST != '' &&
        env.SSH_USER != '' &&
        env.SSH_PRIVATE_KEY != ''
      shell: bash
      run: |
        rsync -avz \
          -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
          ./images/ "$SSH_USER@$SSH_HOST:/var/www/html/images/" || true
        rsync -avz \
          -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
          ./public/images/ "$SSH_USER@$SSH_HOST:/var/www/html/public/images/" || true

    - name: ✅ Проверка деплоя
      if: >
        github.ref == 'refs/heads/main' &&
        github.event_name == 'push' &&
        env.SSH_HOST != '' &&
        env.SSH_USER != '' &&
        env.SSH_PRIVATE_KEY != ''
      shell: bash
      run: |
        echo "🔍 Проверка результатов деплоя:"
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" << 'EOF'
          echo "📂 Содержимое /var/www/html:"
          ls -la /var/www/html/
          echo ""
          echo "🔄 Статус PM2:"
          npm exec pm2 -- status
          echo ""
          echo "📊 Логи PM2 (последние 10 строк):"
          npm exec pm2 -- logs --lines 10 --nostream
        EOF
        echo "🎉 Деплой завершен успешно!"
        if [ -n "$PRODUCTION_DOMAIN" ]; then
          echo "🌐 Сайт доступен по адресу: https://$PRODUCTION_DOMAIN"
        fi

    - name: 📢 Уведомление о деплое
      if: >
        github.ref == 'refs/heads/main' &&
        github.event_name == 'push' &&
        env.TELEGRAM_BOT_TOKEN != '' &&
        env.TELEGRAM_CHAT_ID != ''
      uses: appleboy/telegram-action@v1.0.1
      with:
        to: ${{ env.TELEGRAM_CHAT_ID }}
        token: ${{ env.TELEGRAM_BOT_TOKEN }}
        format: markdown
        message: |
          🚀 **Деплой завершен успешно!**

          **Проект:** Svyatobor Web
          **Ветка:** ${{ github.ref_name }}
          **Коммит:** ${{ github.sha }}

          🌐 **Сайт:** https://${{ env.PRODUCTION_DOMAIN }}

          📊 **PM2 статус:** ✅ Запущен

          🎯 **API маршруты:** ✅ Работают
